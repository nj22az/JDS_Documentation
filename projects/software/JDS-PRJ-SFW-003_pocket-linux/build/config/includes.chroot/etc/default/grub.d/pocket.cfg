# Installed-system kernel command line — Pocket Linux / JDS-PRJ-SFW-003
# Mirrors LIVE_BOOTAPPEND in build/build.sh (minus the live-boot parts).
#   mitigations=off      in-order Atom regains syscall performance (see
#                        docs/hardware-reference.md quirk 4 before removing)
#   fbcon=font:TER16x32  readable console on the 222 DPI 1600x768 panel
GRUB_CMDLINE_LINUX_DEFAULT="quiet mitigations=off fbcon=font:TER16x32"
GRUB_TIMEOUT=2
