# Memory & disk tuning for 2 GB RAM + zram + slow 1.8" PATA disk
# Pocket Linux — JDS-PRJ-SFW-003

# Swap aggressively to zram (compressed RAM is ~50x faster than this disk).
# swappiness >100 is valid since kernel 5.8 and correct when swap is zram.
vm.swappiness = 180
vm.page-cluster = 0
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125

# Keep dirty write-back small so the slow PATA disk never stalls the UI
# behind a large flush.
vm.dirty_background_ratio = 5
vm.dirty_ratio = 15
