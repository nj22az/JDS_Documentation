# GMA 500 (Poulsbo) — Pocket Linux / JDS-PRJ-SFW-003
# Pin the modesetting driver and disable glamor: there is no GL acceleration
# on this GPU, and letting X probe for it only slows startup or crashes it.
Section "Device"
    Identifier "GMA500"
    Driver     "modesetting"
    Option     "AccelMethod" "none"
    Option     "ShadowFB"    "true"
EndSection
