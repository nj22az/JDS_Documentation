# Vaio P trackpoint — Pocket Linux / JDS-PRJ-SFW-003
# The machine has no scroll wheel: hold the middle button and move the
# stick to scroll (the classic ThinkPad gesture).
Section "InputClass"
    Identifier "Vaio P trackpoint scrolling"
    MatchIsPointer "on"
    Driver "libinput"
    Option "ScrollMethod" "button"
    Option "ScrollButton" "2"
    Option "MiddleEmulation" "on"
EndSection
