# Builds the Pocket Linux ISO (JDS-PRJ-SFW-003) and publishes it as a
# GitHub release asset (direct download link, no login, no expiry).
# Uses no marketplace actions at all, so it works under any repository
# actions-policy. The build downloads ~1 GB of Debian packages and takes
# 20-45 minutes.
name: Build Pocket Linux ISO

on:
  workflow_dispatch:
  # Push trigger exists because the repo's GitHub App integration lacks
  # permission to dispatch workflows; path-scoped so only build changes fire it.
  push:
    branches:
      - main
      - claude/sony-vaio-p-linux-distro-pt3bdb
    paths:
      - '.github/workflows/build-pocket-linux-iso.yml'
      - 'projects/software/JDS-PRJ-SFW-003_pocket-linux/build/**'

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PROJECT_DIR: projects/software/JDS-PRJ-SFW-003_pocket-linux
    steps:
      - name: Clone repository
        run: |
          git clone --depth 1 --branch "$GITHUB_REF_NAME" \
            "https://github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Build ISO in a privileged Debian bookworm container
        run: |
          docker run --rm --privileged \
            -v "$PWD/repo:/repo" \
            -w "/repo/$PROJECT_DIR/build" \
            debian:bookworm \
            bash -euxc '
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                live-build ca-certificates
              ./build.sh
            '

      - name: Publish ISO as a GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          iso=$(ls repo/"$PROJECT_DIR"/build/pocket-linux-*.iso)
          checksum=$(sha256sum "$iso" | cut -d' ' -f1)
          tag="pocket-linux-build-${GITHUB_RUN_NUMBER}"
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          release_id=$(curl -sf -X POST "$api/releases" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"tag_name\":\"$tag\",\"target_commitish\":\"$GITHUB_SHA\",\"name\":\"Pocket Linux ISO (build $GITHUB_RUN_NUMBER)\",\"body\":\"Bootable/installable i386 hybrid ISO for the Sony Vaio P (JDS-PRJ-SFW-003).\n\nSHA-256: $checksum\",\"prerelease\":true}" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')
          curl -sf -X POST -T "$iso" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?name=$(basename "$iso")" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" >/dev/null
          echo "ISO published: https://github.com/${GITHUB_REPOSITORY}/releases/tag/$tag"
          echo "SHA-256: $checksum"
